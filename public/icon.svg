<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0e6ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="shadowBack">
      <feDropShadow dx="4" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Blobs -->
  <circle cx="420" cy="70" r="140" fill="#22d3ee" opacity="0.1"/>
  <circle cx="80" cy="440" r="130" fill="#f472b6" opacity="0.1"/>

  <!-- Back card (rotated slightly left) -->
  <g transform="translate(256,220) rotate(-12)">
    <rect x="-90" y="-118" width="180" height="236" rx="18"
      fill="#5b21b6" filter="url(#shadowBack)"/>
    <!-- Back card pattern -->
    <rect x="-78" y="-106" width="156" height="212" rx="12" fill="none"
      stroke="#7c3aed" stroke-width="3"/>
    <rect x="-66" y="-94" width="132" height="188" rx="8" fill="none"
      stroke="#6d28d9" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Front card -->
  <g transform="translate(256,215) rotate(8)">
    <rect x="-90" y="-118" width="180" height="236" rx="18"
      fill="url(#cardFill)" filter="url(#shadow)"/>

    <!-- Top-left corner mark -->
    <text x="-74" y="-88"
      font-family="Arial Rounded MT Bold, Arial Black, sans-serif"
      font-size="28" font-weight="900" fill="url(#accent)">?</text>

    <!-- Bottom-right corner mark (rotated 180) -->
    <text x="74" y="102" text-anchor="end"
      font-family="Arial Rounded MT Bold, Arial Black, sans-serif"
      font-size="28" font-weight="900" fill="url(#accent)"
      transform="rotate(180, 56, 90)">?</text>

    <!-- Center big question mark -->
    <text x="0" y="24" text-anchor="middle"
      font-family="Arial Rounded MT Bold, Arial Black, sans-serif"
      font-size="110" font-weight="900" fill="url(#accent)">?</text>
  </g>

  <!-- PARTY text -->
  <text x="256" y="400"
    text-anchor="middle"
    font-family="Arial Rounded MT Bold, Arial Black, sans-serif"
    font-size="80" font-weight="900"
    fill="#ffffff"
    letter-spacing="3">PARTY</text>

  <!-- GAMES text -->
  <text x="256" y="468"
    text-anchor="middle"
    font-family="Arial Rounded MT Bold, Arial Black, sans-serif"
    font-size="50" font-weight="700"
    fill="#22d3ee"
    letter-spacing="9">GAMES</text>
</svg>
